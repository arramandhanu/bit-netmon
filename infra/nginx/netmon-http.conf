# NetMon Nginx Configuration (HTTP only - for testing)
# Place this in /etc/nginx/sites-available/netmon
# Then: sudo ln -s /etc/nginx/sites-available/netmon /etc/nginx/sites-enabled/

upstream netmon_api {
    server 127.0.0.1:3000;
}

upstream netmon_web {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name _;

    # API routes
    location /api/ {
        proxy_pass http://netmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket support
    location /socket.io/ {
        proxy_pass http://netmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://netmon_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Web Frontend
    location / {
        proxy_pass http://netmon_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
