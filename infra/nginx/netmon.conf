# NetMon Nginx Configuration
# API: localhost:3000 -> netmon.example.com/api
# Web: localhost:3001 -> netmon.example.com

upstream netmon_api {
    server 127.0.0.1:3000;
}

upstream netmon_web {
    server 127.0.0.1:3001;
}

# HTTP -> HTTPS redirect (optional, uncomment if using SSL)
server {
    listen 80;
    server_name netmon.yourdomain.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# API Server
server {
    listen 443 ssl http2;
    server_name netmon.yourdomain.com;

    # SSL certificates (uncomment and configure)
    # ssl_certificate /etc/letsencrypt/live/netmon.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/netmon.yourdomain.com/privkey.pem;

    # API routes
    location /api/ {
        proxy_pass http://netmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # WebSocket support
    location /socket.io/ {
        proxy_pass http://netmon_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://netmon_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Web Frontend (if serving both on same domain)
    location / {
        proxy_pass http://netmon_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
