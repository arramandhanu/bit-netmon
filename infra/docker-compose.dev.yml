
services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: netmon-postgres
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: netmon-redis
    env_file: ../.env
    command: >
      redis-server
        --appendonly yes
        --maxmemory ${REDIS_MAXMEMORY}
        --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.dev
      target: development
    container_name: netmon-api
    env_file: ../.env
    ports:
      - "${API_PORT}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.dev
      target: development
    container_name: netmon-web
    env_file: ../.env
    ports:
      - "${WEB_PORT}:3001"
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/public:/app/apps/web/public
      - web_next_cache:/app/apps/web/.next
    depends_on:
      - api
    restart: unless-stopped

  bull-board:
    build:
      context: ..
      dockerfile: apps/bull-board/Dockerfile.dev
    container_name: netmon-bull-board
    env_file: ../.env
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
      BULL_BOARD_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  web_next_cache:
