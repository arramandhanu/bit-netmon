<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F87171"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="white"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F2937">NetMon Architecture</text>

  <!-- ═══ Frontend Box ═══ -->
  <rect x="175" y="55" width="450" height="100" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="400" y="85" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="white">Frontend</text>
  <text x="400" y="108" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="white" opacity="0.95">Next.js 14 (port 3001)</text>
  <text x="400" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="white" opacity="0.8">ECharts · Leaflet · Tailwind CSS</text>

  <!-- Arrow: Frontend → Backend -->
  <line x1="400" y1="155" x2="400" y2="215" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="394,210 400,222 406,210" fill="#9CA3AF"/>
  <rect x="313" y="172" width="174" height="22" rx="11" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="400" y="187" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">REST API + WebSocket</text>

  <!-- ═══ Backend Box ═══ -->
  <rect x="175" y="225" width="450" height="100" rx="12" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="white">Backend API</text>
  <text x="400" y="278" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="white" opacity="0.95">NestJS 10 (port 3000)</text>
  <text x="400" y="302" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="white" opacity="0.8">Prisma ORM · BullMQ · net-snmp · Winston</text>

  <!-- Arrow: Backend → PostgreSQL -->
  <line x1="310" y1="325" x2="250" y2="395" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="244,390 248,403 256,393" fill="#9CA3AF"/>

  <!-- Arrow: Backend → Redis -->
  <line x1="490" y1="325" x2="550" y2="395" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="544,393 552,403 556,390" fill="#9CA3AF"/>

  <!-- ═══ PostgreSQL Box ═══ -->
  <rect x="80" y="400" width="280" height="90" rx="12" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <!-- DB icon -->
  <ellipse cx="140" cy="430" rx="16" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="124" y1="430" x2="124" y2="448" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="156" y1="430" x2="156" y2="448" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="140" cy="448" rx="16" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <text x="250" y="435" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="white">PostgreSQL 16</text>
  <text x="250" y="456" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="white" opacity="0.9">+ TimescaleDB</text>
  <text x="250" y="476" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="white" opacity="0.7">port 5432</text>

  <!-- ═══ Redis Box ═══ -->
  <rect x="440" y="400" width="280" height="90" rx="12" fill="url(#redGrad)" filter="url(#shadow)"/>
  <!-- Cache icon -->
  <rect x="488" y="422" width="24" height="18" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="488" y1="430" x2="512" y2="430" stroke="white" stroke-width="1" opacity="0.5"/>
  <circle cx="507" cy="426" r="2" fill="white" opacity="0.7"/>
  <rect x="490" y="443" width="20" height="10" rx="2" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="610" y="435" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="white">Redis 7</text>
  <text x="610" y="456" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Queue / Cache</text>
  <text x="610" y="476" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="white" opacity="0.7">port 6379</text>
</svg>
